actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. The Zen Planner API is request/response
    REST on the Daxko Partners platform, authenticated with OAuth 2.0 and gated
    behind a partner/sales arrangement. No AsyncAPI document was created because
    there is no server-push transport on the Zen Planner API to model.

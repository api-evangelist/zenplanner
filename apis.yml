name: Zen Planner
kind: company
description: Zen Planner is gym, martial arts, yoga, affiliate, and fitness studio
  management software covering membership management, billing and payments, class
  scheduling, attendance and check-ins, skills and belt tracking, and a member app.
  Zen Planner is owned by Daxko, and its developer API is published on the shared
  Daxko Partners platform as the Zen Planner API. The API is partner-gated - access
  is requested through a Daxko sales representative - but the API reference is
  publicly documented via Daxko's Redocly-hosted docs. It exposes REST endpoints for
  People, Memberships, Classes (schedules, reservations, attendances), Locations,
  Programs, Prospects, and Groups, authenticated with OAuth 2.0 against the Daxko
  Partners token service.
